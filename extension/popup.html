<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Batch Companion</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        width: 420px;
        margin: 0;
        padding: 16px;
        background: #f5f1e9;
        color: #243026;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .stack {
        display: grid;
        gap: 14px;
      }

      .panel {
        display: grid;
        gap: 12px;
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(36, 48, 38, 0.08);
      }

      .grid {
        display: grid;
        gap: 10px;
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        font-size: 12px;
        color: #5a665d;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid rgba(36, 48, 38, 0.08);
        border-radius: 12px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.92);
        color: inherit;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 14px;
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        background: #3d7a57;
        color: #fff;
      }

      .secondary {
        background: rgba(61, 122, 87, 0.14);
        color: #243026;
      }

      .status {
        font-size: 13px;
        line-height: 1.45;
        color: #5a665d;
      }

      .status.error {
        color: #b24c4c;
      }

      .badge-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(61, 122, 87, 0.12);
        font-size: 12px;
      }

      .prompt-list {
        display: grid;
        gap: 10px;
        max-height: 340px;
        overflow: auto;
      }

      .prompt-card {
        display: grid;
        gap: 8px;
        padding: 12px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(36, 48, 38, 0.08);
      }

      .prompt-card.used {
        border-color: #3aa56c;
        box-shadow: inset 0 0 0 1px rgba(58, 165, 108, 0.3);
      }

      .prompt-text {
        font-size: 12px;
        line-height: 1.45;
        max-height: 86px;
        overflow: auto;
        white-space: pre-wrap;
      }

      .prompt-meta {
        font-size: 11px;
        line-height: 1.4;
        color: #5a665d;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        border-radius: 999px;
        border: 1px solid currentColor;
        font-size: 11px;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <section class="panel">
        <div>
          <h1 style="font-size: 1.05rem">Prompt Batch Companion</h1>
          <p style="margin-top: 6px; color: #5a665d">
            Generate prompt batches from `prompt-db-local`, insert them into producer.ai, and keep
            used status synced across tabs.
          </p>
        </div>
        <div id="status" class="status">Ready</div>
      </section>

      <section class="panel">
        <div class="row" style="justify-content: space-between; align-items: center">
          <h2 style="font-size: 0.96rem">Batch Parameters</h2>
          <button id="refresh-presets" class="secondary">Refresh presets</button>
        </div>

        <div class="grid">
          <div class="field">
            <label for="preset">Preset</label>
            <select id="preset"></select>
          </div>

          <div class="field">
            <label for="pattern">Pattern</label>
            <input id="pattern" placeholder="6x12 random" value="6x12 random" />
          </div>

          <div class="field">
            <label for="include-tags">Include tags</label>
            <input id="include-tags" placeholder="neurofunk, kick_transient_geometry" />
          </div>

          <div class="field">
            <label for="exclude-tags">Exclude tags</label>
            <input id="exclude-tags" placeholder="deprecated, used_up" />
          </div>

          <div class="field">
            <label for="profile-id">Chrome profile / account label</label>
            <input id="profile-id" placeholder="account-A" />
          </div>
        </div>

        <div class="row">
          <button id="save-settings" class="secondary">Save profile label</button>
          <button id="generate" class="primary">Generate</button>
        </div>
      </section>

      <section class="panel">
        <div class="row" style="justify-content: space-between; align-items: center">
          <h2 style="font-size: 0.96rem">Prompts</h2>
          <button id="refresh-prompts" class="secondary">Refresh list</button>
        </div>
        <div class="badge-row" id="summary"></div>
        <div class="prompt-list" id="prompt-list"></div>
      </section>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
